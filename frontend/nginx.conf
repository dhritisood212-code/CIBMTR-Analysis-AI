server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the runtime config; it may be repointed at a new backend.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
